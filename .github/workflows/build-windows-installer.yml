name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Print build environment
        shell: pwsh
        run: |
          node --version
          npm --version
          Get-Location
          Get-ChildItem -Force

          if (!(Test-Path package.json)) { throw "package.json not found at repo root" }
          if (!(Test-Path package-lock.json)) { throw "package-lock.json not found at repo root" }
          if (!(Test-Path electron/main.cjs)) { throw "electron/main.cjs not found" }
          if (!(Test-Path index.html)) { throw "index.html not found" }

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build Windows installer and portable EXE
        run: npx electron-builder --win nsis portable --publish never

      - name: Show dist folder
        if: always()
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse -Force | Format-Table FullName, Length
          } else {
            Write-Host "No dist folder was created."
          }

      - name: Pack Windows artifacts
        shell: pwsh
        run: |
          if (!(Test-Path dist)) { throw "No dist folder was created by electron-builder." }

          New-Item -ItemType Directory -Force artifacts | Out-Null

          $files = Get-ChildItem -Path dist -Recurse -File | Where-Object {
            $_.Name -like "*.exe" -or $_.Name -like "*.blockmap" -or $_.Name -eq "latest.yml"
          }

          if (!$files -or $files.Count -eq 0) {
            throw "No Windows build artifacts found in dist."
          }

          $files | Format-Table FullName, Length
          Compress-Archive -Path $files.FullName -DestinationPath artifacts/spectreverse-windows-installer.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: spectreverse-windows-installer
          path: artifacts/spectreverse-windows-installer.zip
          if-no-files-found: error
